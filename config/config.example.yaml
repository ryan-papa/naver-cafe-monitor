scheduler:
  poll_interval_seconds: 300   # 5분마다 폴링
  timezone: "Asia/Seoul"

cafe:
  url: "https://cafe.naver.com/YOUR_CAFE_ID"
  boards:
    - id: 1
      name: "자유게시판"
      face_check: false
    - id: 2
      name: "사진게시판"
      face_check: true          # 얼굴 인식 활성화

face:
  tolerance: 0.55               # 유사도 임계값 (낮을수록 엄격)
  reference_dir: "data/faces/"  # 기준 이미지 폴더

notification:
  kakao:
    enabled: true
    target_id: "me"             # "me" 또는 친구의 UUID

summary:
  enabled: true
  model: "claude-3-5-haiku-20241022"
  max_tokens: 300

retry:
  max_retries: 3
  delay_seconds: 5
  exponential_backoff: true
