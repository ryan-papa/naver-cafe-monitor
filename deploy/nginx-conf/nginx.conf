     1|worker_processes auto;
     2|
     3|events {
     4|    worker_connections 1024;
     5|}
     6|
     7|http {
     8|    include       /etc/nginx/mime.types;
     9|    default_type  application/octet-stream;
    10|
    11|    log_format main '$remote_addr - $remote_user [$time_local] '
    12|                    '"$request" $status $body_bytes_sent '
    13|                    '"$http_referer" "$http_user_agent"';
    14|
    15|    access_log /var/log/nginx/access.log main;
    16|    error_log  /var/log/nginx/error.log warn;
    17|
    18|    sendfile    on;
    19|    keepalive_timeout 65;
    20|    client_max_body_size 10m;
    21|
    22|    # HTTP → HTTPS redirect
    23|    server {
    24|        listen 80;
    25|        server_name eepp.shop;
    26|        return 301 https://$host$request_uri;
    27|    }
    28|
    29|    # HTTPS with mTLS
    30|    server {
    31|        listen 443 ssl;
    32|        server_name eepp.shop;
    33|
    34|        # Docker internal DNS resolver
    35|        resolver 127.0.0.11 valid=10s;
    36|        set $upstream_api ncm-api;
    37|        set $upstream_web ncm-web;
    38|
    39|        # Server TLS
    40|        ssl_certificate     /etc/nginx/ssl/tls.crt;
    41|        ssl_certificate_key /etc/nginx/ssl/tls.key;
    42|        ssl_protocols       TLSv1.2 TLSv1.3;
    43|        ssl_ciphers         HIGH:!aNULL:!MD5;
    44|
    45|        # mTLS - Client certificate verification
    46|        ssl_client_certificate /etc/nginx/ssl/ca.crt;
    47|        ssl_verify_client      on;
    48|
    49|        # NCM API: /naver-cafe-monitoring/api/* → ncm-api:8000/api/*
    50|        location ~ ^/naver-cafe-monitoring/api/(.*) {
    51|            proxy_pass http://$upstream_api:8000/api/$1$is_args$args;
    52|            proxy_set_header Host $host;
    53|            proxy_set_header X-Real-IP $remote_addr;
    54|            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    55|            proxy_set_header X-Forwarded-Proto $scheme;
    56|        }
    57|
    58|        # NCM Web: /naver-cafe-monitoring/* → ncm-web:80/*
    59|        location ~ ^/naver-cafe-monitoring(/|$)(.*) {
    60|            proxy_pass http://$upstream_web:80/$2$is_args$args;
    61|            proxy_set_header Host $host;
    62|            proxy_set_header X-Real-IP $remote_addr;
    63|            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    64|            proxy_set_header X-Forwarded-Proto $scheme;
    65|        }
    66|    }
    67|}
    68|